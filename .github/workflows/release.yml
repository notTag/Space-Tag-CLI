name: release

# Decoupled cadence: tag space-labels on its own schedule. Each tag publishes a
# semver config artifact (tarball + sha256) that SpaceTag pins in space-labels.lock.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required for gh release create

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package config artifact
        run: |
          VERSION="${GITHUB_REF_NAME#v}"          # v1.2.3 -> 1.2.3
          TARBALL="space-labels-$VERSION.tar.gz"
          # Configs + glue only — binaries are sourced separately by SpaceTag.
          tar czf "$TARBALL" sketchybar yabai zsh
          sha256sum "$TARBALL" > "$TARBALL.sha256"
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "$TARBALL" "$TARBALL.sha256" \
            --title "$GITHUB_REF_NAME" --generate-notes
