name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required for gh release create

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package config artifact
        run: |
          VERSION="${GITHUB_REF_NAME#v}"          # v1.2.3 -> 1.2.3
          TARBALL="space-tag-cli-$VERSION.tar.gz"
          tar czf "$TARBALL" sketchybar yabai bin shell
          sha256sum "$TARBALL" > "$TARBALL.sha256"
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "$TARBALL" "$TARBALL.sha256" \
            --title "$GITHUB_REF_NAME" --generate-notes
